<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoBetStar Ultra</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcf4b;
            --gold-gradient: linear-gradient(135deg, #ffcf4b 0%, #b8860b 100%);
            --dark-bg: #08080a;
            --card-bg: #151518;
            --accent-blue: #00e5ff;
            --danger: #ff3333;
            --success: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--dark-bg); color: #fff; min-height: 100vh; overflow-x: hidden; padding-bottom: 80px; }

        /* --- UI Elements --- */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .logo { font-size: 20px; font-weight: 900; color: var(--gold); text-transform: uppercase; }
        .balance-pill { background: #1a1a1c; padding: 10px 18px; border-radius: 50px; border: 1px solid var(--gold); cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; transition: 0.3s; }
        .balance-pill:active { transform: scale(0.9); }

        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid #222; margin-bottom: 20px; position: relative; overflow: hidden; }
        .btn-gold { background: var(--gold-gradient); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; }

        /* --- Profile & Levels --- */
        .level-badge { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; margin-left: 5px; }
        .progress-container { background: #333; height: 8px; border-radius: 10px; margin-top: 10px; }
        .progress-bar { background: var(--gold); height: 100%; border-radius: 10px; width: 0%; transition: 0.5s; }

        /* --- Modal Payment --- */
        #pay-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .pay-window { background: #fff; color: #000; width: 90%; max-width: 400px; border-radius: 20px; padding: 25px; }
        .pay-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }

        /* --- Shop ID --- */
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1a1a1c; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .id-label { font-family: 'Courier New', monospace; font-weight: bold; color: var(--gold); font-size: 18px; }

        /* --- Games --- */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-item { background: #1a1a1c; border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #282828; }
        .game-item i { font-size: 30px; color: var(--gold); margin-bottom: 10px; display: block; }

        /* --- Navigation --- */
        nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-link { color: #555; text-decoration: none; font-size: 11px; text-align: center; }
        .nav-link.active { color: var(--gold); }
        .nav-link i { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

<header>
    <div class="logo">CasinoBetStar</div>
    <div class="balance-pill" onclick="openPayment()">
        <span id="header-balance">2500</span> ₴
        <i class="fas fa-plus-circle"></i>
    </div>
</header>

<section id="home" class="screen active">
    <div class="card" style="background: linear-gradient(45deg, #111, #222); border-left: 5px solid var(--gold);">
        <h3 id="user-display-name">Tis Vitaliy <span class="level-badge" id="user-lvl">Lvl 1</span></h3>
        <p style="font-size: 12px; color: #888; margin-top:5px;">Досвід до Lvl <span id="next-lvl">2</span>:</p>
        <div class="progress-container"><div class="progress-bar" id="exp-bar"></div></div>
    </div>

    <div class="game-grid">
        <div class="game-item" onclick="alert('Гра завантажується...')"><i class="fas fa-gem"></i>СЛОТИ</div>
        <div class="game-item" onclick="alert('Гра завантажується...')"><i class="fas fa-rocket"></i>CRASH</div>
        <div class="game-item" onclick="alert('Гра завантажується...')"><i class="fas fa-dharmachakra"></i>КОЛЕСО</div>
        <div class="game-item" onclick="showScreen('shop')"><i class="fas fa-shopping-cart"></i>МАГАЗИН</div>
    </div>
</section>

<section id="shop" class="screen">
    <h2 style="margin-bottom:20px;"><i class="fas fa-store"></i> Магазин ID</h2>
    <div id="shop-list">
        </div>
</section>

<section id="profile" class="screen">
    <div class="card" style="text-align: center;">
        <div style="font-size:60px; margin-bottom:10px;">👑</div>
        <h2 id="prof-name">Tis Vitaliy</h2>
        <p style="color:var(--gold); font-weight:bold; margin-bottom:20px;">ID: <span id="prof-id">672026</span></p>
        <button class="btn-gold" onclick="openPayment()">ПОПОВНИТИ БАЛАНС</button>
    </div>
    
    <div class="card">
        <h4>Статистика</h4>
        <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:14px;">
            <span>Зіграно ігор:</span><span id="stat-games">0</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:5px; font-size:14px;">
            <span>Ранг:</span><span style="color:var(--gold)">VIP Бронза</span>
        </div>
    </div>
</section>

<div id="pay-modal">
    <div class="pay-window">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="color:#000">Поповнення рахунку</h3>
            <i class="fas fa-times" onclick="closePayment()" style="cursor:pointer; color:#888"></i>
        </div>
        <label style="font-size:12px; color:#666">Номер картки</label>
        <input type="text" class="pay-input" placeholder="0000 0000 0000 0000" maxlength="19">
        <div style="display:flex; gap:10px;">
            <div style="flex:1">
                <label style="font-size:12px; color:#666">Термін</label>
                <input type="text" class="pay-input" placeholder="ММ/РР">
            </div>
            <div style="flex:1">
                <label style="font-size:12px; color:#666">CVV</label>
                <input type="password" class="pay-input" placeholder="***">
            </div>
        </div>
        <label style="font-size:12px; color:#666">Сума поповнення (₴)</label>
        <input type="number" id="pay-amt" class="pay-input" value="500">
        <button class="btn-gold" onclick="confirmPayment()" style="margin-top:10px; background:#000; color:#fff;">ОПЛАТИТИ</button>
        <div style="text-align:center; margin-top:15px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Visa_Inc._logo.svg/2560px-Visa_Inc._logo.svg.png" width="40" style="margin-right:10px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Mastercard-logo.svg/1280px-Mastercard-logo.svg.png" width="30">
        </div>
    </div>
</div>

<nav>
    <a href="javascript:void(0)" class="nav-link active" onclick="showScreen('home', this)"><i class="fas fa-dice"></i>Ігри</a>
    <a href="javascript:void(0)" class="nav-link" onclick="showScreen('shop', this)"><i class="fas fa-shopping-basket"></i>Магазин</a>
    <a href="javascript:void(0)" class="nav-link" onclick="showScreen('profile', this)"><i class="fas fa-user"></i>Профіль</a>
</nav>

<script>
    let balance = 2500;
    let exp = 0;
    let level = 1;
    let currentID = "672026";

    // Дані магазину ID
    const premiumIDs = [
        { id: "777777", price: 10000 },
        { id: "000001", price: 50000 },
        { id: "666666", price: 8000 },
        { id: "123456", price: 5000 },
        { id: "VIP_TIS", price: 25000 }
    ];

    function updateUI() {
        document.getElementById('header-balance').innerText = balance;
        document.getElementById('user-lvl').innerText = "Lvl " + level;
        document.getElementById('next-lvl').innerText = level + 1;
        document.getElementById('prof-id').innerText = currentID;
        
        // Розрахунок прогрес-бару (кожні 1000 досвіду = новий рівень)
        let progress = (exp % 1000) / 10;
        document.getElementById('exp-bar').style.width = progress + "%";
        
        // Перевірка на новий рівень
        let newLvl = Math.floor(exp / 1000) + 1;
        if(newLvl > level) {
            level = newLvl;
            alert("ВІТАЄМО! Новий рівень: " + level);
        }
    }

    function showScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    }

    // --- Система Магазину ---
    function initShop() {
        const list = document.getElementById('shop-list');
        list.innerHTML = "";
        premiumIDs.forEach(item => {
            const div = document.createElement('div');
            div.className = 'shop-item';
            div.innerHTML = `
                <div>
                    <div class="id-label">${item.id}</div>
                    <div style="font-size:12px; color:#666">Ціна: ${item.price} ₴</div>
                </div>
                <button class="btn-gold" style="width:auto; padding:8px 15px;" onclick="buyID('${item.id}', ${item.price})">КУПИТИ</button>
            `;
            list.appendChild(div);
        });
    }

    function buyID(id, price) {
        if(balance >= price) {
            balance -= price;
            currentID = id;
            alert("Вітаємо! Ваш новий ID: " + id);
            updateUI();
        } else {
            alert("Недостатньо коштів на балансі!");
        }
    }

    // --- Система Поповнення ---
    function openPayment() { document.getElementById('pay-modal').style.display = 'flex'; }
    function closePayment() { document.getElementById('pay-modal').style.display = 'none'; }
    
    function confirmPayment() {
        let amt = parseInt(document.getElementById('pay-amt').value);
        if(amt > 0) {
            balance += amt;
            closePayment();
            alert("Транзакція успішна! Рахунок поповнено на " + amt + " ₴");
            updateUI();
        }
    }

    // Емуляція досвіду (додається при кліках)
    document.addEventListener('click', () => {
        exp += 5; // Кожен клік дає трохи досвіду для тесту
        updateUI();
    });

    // Початкова ініціалізація
    initShop();
    updateUI();
</script>
</body>
</html>
