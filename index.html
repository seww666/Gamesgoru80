<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasinoBetStar</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --dark-bg: #0f0f0f;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent: #ff4500;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            padding-bottom: 70px; /* Місце для мобільного меню */
        }

        /* Header & Balance */
        header {
            background: linear-gradient(180deg, #222, #000);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-box {
            background: #2a2a2a;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            font-weight: bold;
        }

        /* Navigation */
        .nav-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #333;
            z-index: 1000;
        }

        .nav-item {
            color: #888;
            text-decoration: none;
            font-size: 12px;
            text-align: center;
        }

        .nav-item i {
            font-size: 20px;
            display: block;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: var(--gold);
        }

        /* Screens */
        .screen {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Profile Screen */
        .profile-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: var(--gold);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: black;
        }

        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            border: 1px solid #333;
            transition: transform 0.2s;
        }

        .game-card:active {
            transform: scale(0.95);
        }

        .game-img {
            height: 100px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .game-title {
            padding: 10px;
            font-weight: bold;
        }

        /* Game UI */
        .game-container {
            background: #000;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }

        .btn:disabled {
            background: #555;
        }

        /* Slot Machine Styles */
        .slots {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 50px;
            margin-bottom: 20px;
        }

        .slot-box {
            background: #222;
            width: 70px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            border: 2px solid var(--gold);
        }

        /* Crash Game Styles */
        #crash-multiplier {
            font-size: 60px;
            color: var(--gold);
            margin: 20px 0;
        }

        /* Wheel of Fortune */
        #wheel {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid var(--gold);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 2s cubic-bezier(0.1, 0.7, 0.1, 1);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">CasinoBetStar</div>
        <div class="balance-box">
            <span id="balance">1000</span> <span style="color:var(--gold)">₴</span>
        </div>
    </header>

    <section id="home-screen" class="screen active">
        <h2 style="margin-bottom:15px;">Популярні ігри</h2>
        <div class="games-grid">
            <div class="game-card" onclick="openGame('slots')">
                <div class="game-img" style="background: linear-gradient(45deg, #440000, #aa0000);">🎰</div>
                <div class="game-title">Слоти 777</div>
            </div>
            <div class="game-card" onclick="openGame('wheel')">
                <div class="game-img" style="background: linear-gradient(45deg, #004400, #00aa00);">🎡</div>
                <div class="game-title">Колесо</div>
            </div>
            <div class="game-card" onclick="openGame('crash')">
                <div class="game-img" style="background: linear-gradient(45deg, #000044, #0000aa);">🚀</div>
                <div class="game-title">Crash</div>
            </div>
        </div>
    </section>

    <section id="profile-screen" class="screen">
        <div class="profile-card">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <h2>Tis Vitaliy</h2>
            <p style="color: #888; margin-bottom: 20px;">ID: 676767</p>
            <div style="text-align: left; background: #2a2a2a; padding: 15px; border-radius: 10px;">
                <p>Статус: <span style="color: var(--gold);">VIP Gold</span></p>
                <p>Всього виграно: 15,400 ₴</p>
            </div>
            <button class="btn" onclick="addMoney()">Поповнити баланс</button>
        </div>
    </section>

    <section id="game-slots" class="screen">
        <button onclick="showScreen('home-screen')" style="color:white; background:none; border:none; margin-bottom:10px;"><i class="fas fa-arrow-left"></i> Назад</button>
        <div class="game-container">
            <h3>Слоти 777</h3>
            <div class="slots">
                <div class="slot-box" id="s1">🍒</div>
                <div class="slot-box" id="s2">🍒</div>
                <div class="slot-box" id="s3">🍒</div>
            </div>
            <p>Ставка: 10 ₴</p>
            <button class="btn" id="slot-btn" onclick="playSlots()">Крутити</button>
        </div>
    </section>

    <section id="game-wheel" class="screen">
        <button onclick="showScreen('home-screen')" style="color:white; background:none; border:none; margin-bottom:10px;"><i class="fas fa-arrow-left"></i> Назад</button>
        <div class="game-container">
            <h3>Колесо Фортуни</h3>
            <div id="wheel">💎</div>
            <p style="margin-top:15px;">Ставка: 20 ₴</p>
            <button class="btn" id="wheel-btn" onclick="playWheel()">Грати</button>
        </div>
    </section>

    <section id="game-crash" class="screen">
        <button onclick="showScreen('home-screen')" style="color:white; background:none; border:none; margin-bottom:10px;"><i class="fas fa-arrow-left"></i> Назад</button>
        <div class="game-container">
            <h3>Crash Game</h3>
            <div id="crash-multiplier">1.00x</div>
            <p>Ставка: 50 ₴</p>
            <button class="btn" id="crash-start" onclick="startCrash()">Зробити ставку</button>
            <button class="btn" id="crash-stop" onclick="stopCrash()" style="display:none; background: #ff4500;">Забрати!</button>
        </div>
    </section>

    <nav class="nav-menu">
        <a href="#" class="nav-item active" onclick="showScreen('home-screen', this)">
            <i class="fas fa-home"></i>Лобі
        </a>
        <a href="#" class="nav-item" onclick="showScreen('profile-screen', this)">
            <i class="fas fa-user"></i>Профіль
        </a>
    </nav>

    <script>
        let balance = 1000;
        const balanceEl = document.getElementById('balance');

        function updateBalance(amount) {
            balance += amount;
            balanceEl.innerText = balance;
        }

        function showScreen(screenId, navEl = null) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if(navEl) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                navEl.classList.add('active');
            }
        }

        function openGame(game) {
            showScreen('game-' + game);
        }

        function addMoney() {
            alert("Демо-поповнення на 500₴");
            updateBalance(500);
        }

        /* --- ЛОГІКА СЛОТІВ --- */
        const symbols = ['🍒', '🍋', '🔔', '💎', '7️⃣'];
        function playSlots() {
            if (balance < 10) return alert("Недостатньо коштів!");
            updateBalance(-10);
            
            const btn = document.getElementById('slot-btn');
            btn.disabled = true;

            let count = 0;
            const interval = setInterval(() => {
                document.getElementById('s1').innerText = symbols[Math.floor(Math.random() * symbols.length)];
                document.getElementById('s2').innerText = symbols[Math.floor(Math.random() * symbols.length)];
                document.getElementById('s3').innerText = symbols[Math.floor(Math.random() * symbols.length)];
                count++;
                if (count > 15) {
                    clearInterval(interval);
                    checkSlots();
                    btn.disabled = false;
                }
            }, 100);
        }

        function checkSlots() {
            const s1 = document.getElementById('s1').innerText;
            const s2 = document.getElementById('s2').innerText;
            const s3 = document.getElementById('s3').innerText;

            if (s1 === s2 && s2 === s3) {
                updateBalance(100);
                alert("ДЖЕКПОТ! Ви виграли 100 ₴");
            } else if (s1 === s2 || s2 === s3 || s1 === s3) {
                updateBalance(20);
                alert("Малий виграш! 20 ₴");
            }
        }

        /* --- ЛОГІКА КОЛЕСА --- */
        let wheelRotation = 0;
        function playWheel() {
            if (balance < 20) return alert("Недостатньо коштів!");
            updateBalance(-20);

            const wheel = document.getElementById('wheel');
            const btn = document.getElementById('wheel-btn');
            btn.disabled = true;

            const extraDeg = Math.floor(Math.random() * 360) + 720;
            wheelRotation += extraDeg;
            wheel.style.transform = `rotate(${wheelRotation}deg)`;

            setTimeout(() => {
                const prizes = [0, 50, 0, 100, 0, 10];
                const win = prizes[Math.floor(Math.random() * prizes.length)];
                updateBalance(win);
                alert(win > 0 ? `Ви виграли ${win} ₴!` : "Спробуйте ще раз!");
                btn.disabled = false;
            }, 2000);
        }

        /* --- ЛОГІКА CRASH --- */
        let crashInterval;
        let currentMultiplier = 1.0;
        let isCrashed = false;

        function startCrash() {
            if (balance < 50) return alert("Недостатньо коштів!");
            updateBalance(-50);

            isCrashed = false;
            currentMultiplier = 1.0;
            const display = document.getElementById('crash-multiplier');
            const startBtn = document.getElementById('crash-start');
            const stopBtn = document.getElementById('crash-stop');

            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';

            const crashPoint = (Math.random() * 5 + 1).toFixed(2);

            crashInterval = setInterval(() => {
                currentMultiplier += 0.05;
                display.innerText = currentMultiplier.toFixed(2) + 'x';

                if (currentMultiplier >= crashPoint) {
                    clearInterval(crashInterval);
                    display.innerText = "BOOM!";
                    display.style.color = "red";
                    isCrashed = true;
                    setTimeout(() => {
                        display.style.color = "var(--gold)";
                        startBtn.style.display = 'block';
                        stopBtn.style.display = 'none';
                    }, 2000);
                }
            }, 100);
        }

        function stopCrash() {
            if (isCrashed) return;
            clearInterval(crashInterval);
            
            const win = Math.floor(50 * currentMultiplier);
            updateBalance(win);
            alert(`Забрали! Виграш: ${win} ₴`);

            document.getElementById('crash-start').style.display = 'block';
            document.getElementById('crash-stop').style.display = 'none';
        }
    </script>
</body>
</html>
