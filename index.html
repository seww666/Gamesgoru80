<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BetMaster - Ставки на Спорт</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0e1a;color:#fff;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none;}
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:70px;}

/* Header */
.header{background:linear-gradient(135deg,#1a1f35,#0d1225);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid #1e2640;}
.logo{font-size:20px;font-weight:800;color:#f5a623;}
.logo span{color:#fff;}
.balance-box{background:linear-gradient(135deg,#f5a623,#e8950f);padding:6px 14px;border-radius:20px;font-weight:700;font-size:14px;color:#000;display:flex;align-items:center;gap:5px;}
.balance-box svg{width:16px;height:16px;}

/* Tabs */
.tabs{display:flex;background:#111627;border-bottom:1px solid #1e2640;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:80px;padding:10px 8px;text-align:center;font-size:12px;font-weight:600;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap;}
.tab.active{color:#f5a623;border-bottom-color:#f5a623;}
.tab:hover{color:#f5a623;}

/* Sport icons */
.sport-tabs{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:#0f1322;}
.sport-tabs::-webkit-scrollbar{display:none;}
.sport-tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 12px;border-radius:10px;background:#1a1f35;cursor:pointer;min-width:60px;transition:.2s;border:1px solid transparent;}
.sport-tab.active{border-color:#f5a623;background:#1f2847;}
.sport-tab .icon{font-size:20px;}
.sport-tab .name{font-size:10px;color:#9ca3af;white-space:nowrap;}
.sport-tab.active .name{color:#f5a623;}

/* Live indicator */
.live-badge{background:#ef4444;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;animation:pulse 1.5s infinite;display:inline-flex;align-items:center;gap:3px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
.live-dot{width:5px;height:5px;background:#fff;border-radius:50%;display:inline-block;}

/* Match Card */
.matches{padding:8px;}
.league-header{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:12px;color:#9ca3af;font-weight:600;}
.league-header img{width:16px;height:16px;border-radius:2px;}
.match-card{background:#141829;border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid #1e2640;transition:.2s;}
.match-card:active{transform:scale(.99);}
.match-info{padding:12px;display:flex;justify-content:space-between;align-items:center;}
.match-time{text-align:center;min-width:50px;}
.match-time .time{font-size:11px;color:#f5a623;font-weight:600;}
.match-time .date{font-size:10px;color:#6b7280;}
.match-time .score{font-size:18px;font-weight:800;color:#fff;}
.match-time .minute{font-size:10px;color:#ef4444;font-weight:600;}
.teams{flex:1;padding:0 10px;}
.team{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px;font-weight:500;}
.team-logo{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;}
.odds-row{display:flex;gap:6px;padding:0 12px 12px;}
.odd-btn{flex:1;background:#1a2040;border:1px solid #2a3055;border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:.2s;}
.odd-btn:active{transform:scale(.95);}
.odd-btn.selected{background:#2d4a1e;border-color:#4ade80;}
.odd-btn .label{font-size:10px;color:#6b7280;margin-bottom:2px;}
.odd-btn .value{font-size:14px;font-weight:700;color:#f5a623;}
.odd-btn.selected .value{color:#4ade80;}
.more-odds{text-align:center;padding:0 12px 10px;}
.more-odds span{font-size:11px;color:#6b7280;cursor:pointer;}

/* Betslip */
.betslip-bar{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:linear-gradient(135deg,#f5a623,#e8950f);padding:10px 16px;display:none;align-items:center;justify-content:space-between;z-index:99;cursor:pointer;}
.betslip-bar.show{display:flex;}
.betslip-count{background:#000;color:#f5a623;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;}
.betslip-text{font-weight:700;color:#000;font-size:14px;}

/* Betslip Modal */
.betslip-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:200;display:none;justify-content:center;align-items:flex-end;}
.betslip-modal.show{display:flex;}
.betslip-content{background:#141829;width:100%;max-width:480px;max-height:85vh;border-radius:20px 20px 0 0;overflow-y:auto;padding:20px 16px;}
.betslip-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.betslip-title{font-size:18px;font-weight:800;}
.betslip-close{background:#1e2640;border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.bet-item{background:#1a2040;border-radius:10px;padding:12px;margin-bottom:8px;position:relative;}
.bet-item-remove{position:absolute;top:8px;right:8px;background:#ef4444;border:none;color:#fff;width:20px;height:20px;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.bet-match{font-size:12px;color:#9ca3af;margin-bottom:4px;}
.bet-pick{font-size:14px;font-weight:600;margin-bottom:4px;}
.bet-odd{color:#f5a623;font-weight:700;}
.stake-section{margin-top:16px;padding:16px;background:#1a2040;border-radius:12px;}
.stake-label{font-size:12px;color:#9ca3af;margin-bottom:8px;}
.stake-input-row{display:flex;gap:8px;margin-bottom:10px;}
.stake-input{flex:1;background:#0a0e1a;border:1px solid #2a3055;border-radius:8px;padding:10px;color:#fff;font-size:16px;font-weight:700;text-align:center;outline:none;}
.stake-input:focus{border-color:#f5a623;}
.quick-stakes{display:flex;gap:6px;flex-wrap:wrap;}
.quick-stake{background:#0a0e1a;border:1px solid #2a3055;border-radius:6px;padding:6px 12px;font-size:12px;color:#9ca3af;cursor:pointer;font-weight:600;}
.quick-stake:active{background:#1e2640;color:#f5a623;border-color:#f5a623;}
.payout-row{display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid #2a3055;}
.payout-label{color:#9ca3af;font-size:13px;}
.payout-value{color:#4ade80;font-weight:800;font-size:16px;}
.place-bet-btn{width:100%;padding:14px;background:linear-gradient(135deg,#f5a623,#e8950f);border:none;border-radius:12px;font-size:16px;font-weight:800;color:#000;margin-top:16px;cursor:pointer;transition:.2s;}
.place-bet-btn:active{transform:scale(.97);opacity:.9;}
.place-bet-btn:disabled{opacity:.5;cursor:not-allowed;}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#111627;border-top:1px solid #1e2640;display:flex;z-index:100;}
.nav-item{flex:1;padding:8px 0;text-align:center;cursor:pointer;transition:.2s;}
.nav-item.active{color:#f5a623;}
.nav-item .nav-icon{font-size:20px;margin-bottom:2px;}
.nav-item .nav-label{font-size:10px;color:#6b7280;}
.nav-item.active .nav-label{color:#f5a623;}

/* Pages */
.page{display:none;}
.page.active{display:block;}

/* My Bets */
.my-bet-card{background:#141829;border:1px solid #1e2640;border-radius:12px;padding:14px;margin:8px 16px;}
.my-bet-status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-bottom:8px;}
.my-bet-status.pending{background:#f5a62333;color:#f5a623;}
.my-bet-status.won{background:#4ade8033;color:#4ade80;}
.my-bet-status.lost{background:#ef444433;color:#ef4444;}
.my-bet-match{font-size:13px;color:#9ca3af;margin-bottom:3px;}
.my-bet-pick{font-size:14px;font-weight:600;margin-bottom:8px;}
.my-bet-row{display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:4px;}
.my-bet-row span:last-child{color:#fff;font-weight:600;}

/* Result modal */
.result-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:300;display:none;justify-content:center;align-items:center;}
.result-modal.show{display:flex;}
.result-box{text-align:center;padding:40px 30px;border-radius:20px;max-width:320px;width:90%;}
.result-box.win{background:linear-gradient(135deg,#1a3a1a,#0a2a0a);border:2px solid #4ade80;}
.result-box.lose{background:linear-gradient(135deg,#3a1a1a,#2a0a0a);border:2px solid #ef4444;}
.result-icon{font-size:60px;margin-bottom:16px;}
.result-title{font-size:24px;font-weight:800;margin-bottom:8px;}
.result-text{font-size:14px;color:#9ca3af;margin-bottom:20px;}
.result-amount{font-size:28px;font-weight:800;margin-bottom:20px;}
.result-amount.win{color:#4ade80;}
.result-amount.lose{color:#ef4444;}
.result-btn{background:linear-gradient(135deg,#f5a623,#e8950f);border:none;border-radius:12px;padding:12px 40px;font-size:14px;font-weight:700;color:#000;cursor:pointer;}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:#6b7280;}
.empty-state .icon{font-size:48px;margin-bottom:12px;}
.empty-state p{font-size:14px;}

/* Scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a3055;border-radius:3px;}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#4ade80;color:#000;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:700;z-index:400;display:none;animation:slideDown .3s ease;}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* Stats section */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px;}
.stat-card{background:#141829;border:1px solid #1e2640;border-radius:12px;padding:16px;text-align:center;}
.stat-value{font-size:22px;font-weight:800;color:#f5a623;}
.stat-label{font-size:11px;color:#6b7280;margin-top:4px;}
.stat-card.green .stat-value{color:#4ade80;}
.stat-card.red .stat-value{color:#ef4444;}

/* Promo banner */
.promo-banner{margin:8px 16px;background:linear-gradient(135deg,#1e3a5f,#0d2240);border-radius:12px;padding:16px;border:1px solid #2a5080;}
.promo-banner h3{font-size:14px;color:#f5a623;margin-bottom:4px;}
.promo-banner p{font-size:12px;color:#9ca3af;}
</style>
</head>

<div class="app">
  <!-- Header -->

      <span id="balanceDisplay">1000.00 ₴</span>
    </div>
  </div>

  <!-- Page: Main -->
  <div class="page active" id="pageSport">
    <!-- Sport Tabs -->
    <div class="sport-tabs" id="sportTabs"></div>
    
    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchMatchTab('live')"><span class="live-dot" style="margin-right:4px;"></span> LIVE</div>
      <div class="tab" onclick="switchMatchTab('prematch')">Прематч</div>
      <div class="tab" onclick="switchMatchTab('top')">Топ</div>
    </div>

    <!-- Promo -->
    <div class="promo-banner" id="promoBanner">
      <h3>🎁 Бонус на перший депозит 100%</h3>
      <p>Отримай до 5000₴ бонусу на спортивні ставки!</p>
    </div>

    <!-- Matches -->
    <div class="matches" id="matchesList"></div>
  </div>

  <!-- Page: My Bets -->
  <div class="page" id="pageMyBets">
    <div style="padding:16px;font-size:18px;font-weight:800;">Мої ставки</div>
    <div class="tabs">
      <div class="tab active" onclick="filterBets('all')">Всі</div>
      <div class="tab" onclick="filterBets('pending')">Активні</div>
      <div class="tab" onclick="filterBets('won')">Виграні</div>
      <div class="tab" onclick="filterBets('lost')">Програні</div>
    </div>
    <div id="myBetsList"></div>
  </div>

  <!-- Page: Stats -->
  <div class="page" id="pageStats">
    <div style="padding:16px;font-size:18px;font-weight:800;">Статистика</div>
    <div class="stats-grid" id="statsGrid"></div>
    <div style="padding:0 16px;font-size:14px;font-weight:700;margin-bottom:8px;">Історія балансу</div>
    <div id="balanceHistory" style="padding:0 16px 16px;"></div>
  </div>

  <!-- Betslip Bar -->
  <div class="betslip-bar" id="betslipBar" onclick="openBetslip()">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="betslip-count" id="betslipCount">0</div>
      <div class="betslip-text">Купон</div>
    </div>
    <div style="font-weight:700;color:#000;" id="betslipTotalOdd">1.00</div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('pageSport',this)">
      <div class="nav-icon">⚽</div>
      <div class="nav-label">Спорт</div>
    </div>
    <div class="nav-item" onclick="switchPage('pageMyBets',this)">
      <div class="nav-icon">🎫</div>
      <div class="nav-label">Мої ставки</div>
    </div>
    <div class="nav-item" onclick="switchPage('pageStats',this)">
      <div class="nav-icon">📊</div>
      <div class="nav-label">Статистика</div>
    </div>
  </div>
</div>

<!-- Betslip Modal -->
<div class="betslip-modal" id="betslipModal" onclick="closeBetslipOutside(event)">
  <div class="betslip-content" id="betslipContent"></div>
</div>

<!-- Result Modal -->
<div class="result-modal" id="resultModal">
  <div class="result-box" id="resultBox"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

// ============ GENERATE MATCHES ============
function generateMatches() {
  matchData = [];
  const sportData = leaguesData[currentSport];
  if (!sportData) return;

  const now = new Date();
  let matchId = 0;

  sportData.leagues.forEach(league => {
    const teamPairs = sportData.teams[league.name] || [];
    teamPairs.forEach(pair => {
      matchId++;
      const isLive = Math.random() < 0.4;
      const isTop = Math.random() < 0.3;
      
      let minute = 0, score1 = 0, score2 = 0;
      let startTime;
      
      if (isLive) {
        minute = Math.floor(Math.random() * 90) + 1;
        if (currentSport === 'basketball') minute = Math.floor(Math.random() * 48) + 1;
        if (currentSport === 'tennis') minute = 0;
        if (currentSport === 'hockey') minute = Math.floor(Math.random() * 60) + 1;
        
        // Генерація правдоподібного рахунку
        if (currentSport === 'football') {
          score1 = Math.random() < 0.3 ? 0 : Math.floor(Math.random() * 3) + (Math.random() < 0.2 ? 1 : 0);
          score2 = Math.random() < 0.3 ? 0 : Math.floor(Math.random() * 3) + (Math.random() < 0.2 ? 1 : 0);
        } else if (currentSport === 'basketball') {
          const q = Math.ceil(minute / 12);
          score1 = Math.floor(Math.random() * 25 * q) + 15 * q;
          score2 = Math.floor(Math.random() * 25 * q) + 15 * q;
        } else if (currentSport === 'tennis') {
          score1 = Math.floor(Math.random() * 3);
          score2 = Math.floor(Math.random() * 3);
          if (score1 === 0 && score2 === 0) score1 = 1;
        } else if (currentSport === 'hockey') {
          score1 = Math.floor(Math.random() * 4);
          score2 = Math.floor(Math.random() * 4);
        } else if (currentSport === 'mma' || currentSport === 'esports') {
          score1 = Math.floor(Math.random() * 2);
          score2 = Math.floor(Math.random() * 2);
        }
        startTime = null;
      } else {
        const hoursAhead = Math.floor(Math.random() * 48) + 1;
        startTime = new Date(now.getTime() + hoursAhead * 3600000);
      }

      // Генерація коефіцієнтів
      let home, draw, away;
      const r = Math.random();
      if (r < 0.33) {
        // фаворит - хазяї
        home = +(1.2 + Math.random() * 0.8).toFixed(2);
        draw = currentSport !== 'tennis' && currentSport !== 'mma' && currentSport !== 'esports' ? +(3.0 + Math.random() * 1.5).toFixed(2) : null;
        away = +(2.8 + Math.random() * 3.0).toFixed(2);
      } else if (r < 0.66) {
        // рівні
        home = +(1.8 + Math.random() * 0.5).toFixed(2);
        draw = currentSport !== 'tennis' && currentSport !== 'mma' && currentSport !== 'esports' ? +(3.0 + Math.random() * 0.8).toFixed(2) : null;
        away = +(1.8 + Math.random() * 0.5).toFixed(2);
      } else {
        // фаворит - гості
        home = +(2.8 + Math.random() * 3.0).toFixed(2);
        draw = currentSport !== 'tennis' && currentSport !== 'mma' && currentSport !== 'esports' ? +(3.0 + Math.random() * 1.5).toFixed(2) : null;
        away = +(1.2 + Math.random() * 0.8).toFixed(2);
      }

      matchData.push({
        id: currentSport + '_' + matchId,
        league: league,
        team1: pair[0],
        team2: pair[1],
        color1: pair[2],
        color2: pair[3],
        isLive,
        isTop,
        minute,
        score1,
        score2,
        startTime,
        home,
        draw,
        away,
        sport: currentSport
      });
    });
  });
}

                <div class="score">${m.score1} : ${m.score2}</div>

            <div class="odd-btn ${isSelected(m.id,'X')?'selected':''}" onclick="toggleBet('${m.id}','X',${m.draw},'${esc(m.team1)} vs ${esc(m.team2)}','Нічия')">
              <div class="label">X</div>
              <div class="value">${m.draw}</div>

function esc(s) { return s.replace(/'/g, "\\'"); }

function getContrast(hex) {
  if (!hex || hex === '#fff' || hex === '#ffffff' || hex === '#fde100' || hex === '#fdd302' || hex === '#fcb514' || hex === '#ffd700' || hex === '#f1c40f' || hex === '#fdd835' || hex === '#f47920' || hex === '#f39c12' || hex === '#e67e22' || hex === '#fdb913' || hex === '#b4975a' || hex === '#65b32e' || hex === '#4ade80' || hex === '#2ecc71' || hex === '#27ae60' || hex === '#87d8f7' || hex === '#009bff' || hex === '#6cb4ee') return '#000';
  return '#fff';
}

function formatTime(d) {
  if (!d) return '';
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function formatDate(d) {
  if (!d) return '';
  const months = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
  return d.getDate() + ' ' + months[d.getMonth()];
}

function isSelected(matchId, pick) {
  return betslip.some(b => b.matchId === matchId && b.pick === pick);
}

// ============ BETSLIP ============
function toggleBet(matchId, pick, odd, matchName, pickName) {
  const idx = betslip.findIndex(b => b.matchId === matchId);
  if (idx > -1) {
    if (betslip[idx].pick === pick) {
      betslip.splice(idx, 1);
    } else {
      betslip[idx] = {matchId, pick, odd, matchName, pickName};
    }
  } else {
    if (betslip.length >= 10) {
      showToast('Максимум 10 подій в купоні');
      return;
    }
    betslip.push({matchId, pick, odd, matchName, pickName});
  }
  updateBetslipBar();
  renderMatches();
}

function updateBetslipBar() {
  const bar = document.getElementById('betslipBar');
  const count = document.getElementById('betslipCount');
  const totalOdd = document.getElementById('betslipTotalOdd');
  
  if (betslip.length > 0) {
    bar.classList.add('show');
    count.textContent = betslip.length;
    const tot = betslip.reduce((acc, b) => acc * b.odd, 1);
    totalOdd.textContent = tot.toFixed(2);
  } else {
    bar.classList.remove('show');
  }
}

function openBetslip() {
  if (betslip.length === 0) return;
  const modal = document.getElementById('betslipModal');
  modal.classList.add('show');
  renderBetslipContent();
}

function renderBetslipContent() {

        <div class="quick-stake" onclick="setStake(500)">500</div>

      </div>

      </div>

      </div>

      ПОСТАВИТИ ${(100).toFixed(2)} ₴

function removeBetItem(i) {
  betslip.splice(i, 1);
  if (betslip.length === 0) {
    closeBetslip();
  } else {
    renderBetslipContent();
  }
  updateBetslipBar();
  renderMatches();
}

function setStake(val, type) {
  const inp = document.getElementById('stakeInput');
  if (type === 'all') {
    inp.value = Math.floor(balance);
  } else {
    inp.value = val;
  }
  updatePayout();
}

function updatePayout() {
  const inp = document.getElementById('stakeInput');
  const payout = document.getElementById('payoutValue');
  const btn = document.getElementById('placeBetBtn');
  const stake = parseFloat(inp.value) || 0;
  const totalOdd = betslip.reduce((acc, b) => acc * b.odd, 1);
  payout.textContent = (stake * totalOdd).toFixed(2) + ' ₴';
  btn.textContent = `ПОСТАВИТИ ${stake.toFixed(2)} ₴`;
  btn.disabled = stake <= 0 || stake > balance;
}

function placeBet() {
  const inp = document.getElementById('stakeInput');
  const stake = parseFloat(inp.value) || 0;
  
  if (stake <= 0) { showToast('Введіть суму ставки'); return; }
  if (stake > balance) { showToast('Недостатньо коштів'); return; }
  
  const totalOdd = betslip.reduce((acc, b) => acc * b.odd, 1);
  const possibleWin = stake * totalOdd;
  
  balance -= stake;
  updateBalance();
  
  const bet = {
    id: betIdCounter++,
    picks: [...betslip],
    stake,
    totalOdd,
    possibleWin,
    status: 'pending',
    placedAt: new Date(),
    result: null
  };
  
  myBets.unshift(bet);
  totalBets++;
  
  betslip = [];
  updateBetslipBar();
  closeBetslip();
  renderMatches();
  
  showToast('✅ Ставку прийнято!');
  balanceLog.push({time: new Date(), value: balance, label: `Ставка -${stake}₴`});
  
  // Симуляція результату через 5-15 секунд
  const delay = (Math.random() * 10000) + 5000;
  setTimeout(() => resolveBet(bet.id), delay);
}

function resolveBet(betId) {
  const bet = myBets.find(b => b.id === betId);
  if (!bet || bet.status !== 'pending') return;
  
  // Визначаємо результат на основі ймовірності (коефіцієнти впливають)
  // Менший коефіцієнт = більша ймовірність виграшу
  let winProbability = 0;
  
  bet.picks.forEach(pick => {
    // Ймовірність виграшу ≈ 1/коеф, але з невеликим бонусом
    const p = (1 / pick.odd) * 0.9; // Трохи менше реальної ймовірності (маржа)
    winProbability += Math.log(p);
  });
  
  // Для експрес-ставок ймовірність падає
  const totalProb = Math.exp(winProbability);
  const won = Math.random() < totalProb;
  
  bet.status = won ? 'won' : 'lost';
  
  if (won) {
    bet.result = bet.possibleWin;
    balance += bet.possibleWin;
    totalWon += bet.possibleWin - bet.stake;
    balanceLog.push({time: new Date(), value: balance, label: `Виграш +${bet.possibleWin.toFixed(2)}₴`});
    showResultModal(true, bet.possibleWin, bet);
  } else {
    bet.result = 0;
    totalLost += bet.stake;
    balanceLog.push({time: new Date(), value: balance, label: `Програш -${bet.stake.toFixed(2)}₴`});
    showResultModal(false, bet.stake, bet);
  }
  
  updateBalance();
}

function showResultModal(won, amount, bet) {
  const modal = document.getElementById('resultModal');
  const box = document.getElementById('resultBox');
  
  const picksText = bet.picks.map(p => `${p.matchName}<br><b>${p.pickName}</b> (${p.odd})`).join('<br><br>');
  
  box.className = `result-box ${won ? 'win' : 'lose'}`;
  box.innerHTML = `
    <div class="result-icon">${won ? '🎉' : '😔'}</div>
    <div class="result-title">${won ? 'ВИГРАШ!' : 'ПРОГРАШ'}</div>
    <div class="result-text" style="font-size:12px;line-height:1.6;margin-bottom:16px;">${picksText}</div>
    <div class="result-amount ${won ? 'win' : 'lose'}">${won ? '+' : '-'}${amount.toFixed(2)} ₴</div>
    <button class="result-btn" onclick="closeResult()">OK</button>
  `;
  modal.classList.add('show');
  
  // Вібрація
  if (navigator.vibrate) {
    navigator.vibrate(won ? [100, 50, 100, 50, 200] : [300]);
  }
}

function closeResult() {
  document.getElementById('resultModal').classList.remove('show');
}

function closeBetslip() {
  document.getElementById('betslipModal').classList.remove('show');
}

function closeBetslipOutside(e) {
  if (e.target === document.getElementById('betslipModal')) {
    closeBetslip();
  }
}

// ============ NAVIGATION ============
function switchPage(pageId, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  
  if (pageId === 'pageMyBets') renderMyBets();
  if (pageId === 'pageStats') renderStats();
}

function switchSport(sportId) {
  currentSport = sportId;
  renderSportTabs();
  generateMatches();
  renderMatches();
}

function switchMatchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tabs .tab').forEach((t, i) => {
    t.classList.toggle('active', 
      (tab === 'live' && i === 0) || 
      (tab === 'prematch' && i === 1) || 
      (tab === 'top' && i === 2)
    );
  });
  renderMatches();
}

// ============ STATS ============
function renderStats() {
  const wonCount = myBets.filter(b => b.status === 'won').length;
  const lostCount = myBets.filter(b => b.status === 'lost').length;
  const pendingCount = myBets.filter(b => b.status === 'pending').length;
  const winRate = totalBets > 0 ? ((wonCount / (wonCount + lostCount || 1)) * 100).toFixed(1) : '0.0';
  const profit = totalWon - totalLost;
  
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-value">${balance.toFixed(0)}</div><div class="stat-label">Баланс ₴</div></div>
    <div class="stat-card"><div class="stat-value">${totalBets}</div><div class="stat-label">Всього ставок</div></div>
    <div class="stat-card green"><div class="stat-value">${wonCount}</div><div class="stat-label">Виграно</div></div>
    <div class="stat-card red"><div class="stat-value">${lostCount}</div><div class="stat-label">Програно</div></div>
    <div class="stat-card"><div class="stat-value">${pendingCount}</div><div class="stat-label">Активні</div></div>
    <div class="stat-card"><div class="stat-value">${winRate}%</div><div class="stat-label">Вінрейт</div></div>
    <div class="stat-card ${profit >= 0 ? 'green' : 'red'}"><div class="stat-value">${profit >= 0 ? '+' : ''}${profit.toFixed(0)}</div><div class="stat-label">Прибуток ₴</div></div>
    <div class="stat-card green"><div class="stat-value">${totalWon.toFixed(0)}</div><div class="stat-label">Виграно ₴</div></div>
  `;
  
  document.getElementById('balanceHistory').innerHTML = balanceLog.slice(-10).reverse().map(l => `
    <div style="display:flex;justify-content:space-between;padding:8px 12px;background:#141829;border-radius:8px;margin-bottom:4px;font-size:12px;">

      <span style="font-weight:700;color:${l.value >= 1000 ? '#4ade80' : '#ef4444'}">${l.value.toFixed(0)} ₴</span>
    </div>
  `).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}

// ============ LIVE SIMULATION ============
function simulateLive() {
  matchData.forEach(m => {
    if (!m.isLive) return;
    
    // Оновлення хвилин
    m.minute += 1;
    
    if (currentSport === 'football' && m.minute > 90) {
      m.minute = 90;
    }
    if (currentSport === 'basketball' && m.minute > 48) {
      m.minute = 48;
    }
    
    // Шанс гола/очка
    if (currentSport === 'football') {
      if (Math.random() < 0.03) {
        if (Math.random() < 0.5) m.score1++; else m.score2++;
        // Перерахунок коефіцієнтів
        recalcOdds(m);
      }
    } else if (currentSport === 'basketball') {
      if (Math.random() < 0.4) {
        const pts = Math.random() < 0.3 ? 3 : 2;
        if (Math.random() < 0.5) m.score1 += pts; else m.score2 += pts;
        recalcOdds(m);
      }
    } else if (currentSport === 'hockey') {
      if (Math.random() < 0.02) {
        if (Math.random() < 0.5) m.score1++; else m.score2++;
        recalcOdds(m);
      }
    }
    
    // Невеликі зміни коефіцієнтів
    if (Math.random() < 0.15) {
      m.home = Math.max(1.01, +(m.home + (Math.random() - 0.5) * 0.1).toFixed(2));
      m.away = Math.max(1.01, +(m.away + (Math.random() - 0.5) * 0.1).toFixed(2));
      if (m.draw) m.draw = Math.max(1.01, +(m.draw + (Math.random() - 0.5) * 0.1).toFixed(2));
    }
  });
  
  renderMatches();
}

function recalcOdds(m) {
  const diff = m.score1 - m.score2;
  if (diff > 0) {
    m.home = Math.max(1.05, +(m.home * 0.85).toFixed(2));
    m.away = +(m.away * 1.2).toFixed(2);
  } else if (diff < 0) {
    m.away = Math.max(1.05, +(m.away * 0.85).toFixed(2));
    m.home = +(m.home * 1.2).toFixed(2);
  }
  if (m.draw) {
    m.draw = +(3.0 + Math.random() * 1.5).toFixed(2);
  }
}

// ============ INIT ============
function init() {
  renderSportTabs();
  generateMatches();
  renderMatches();
  updateBalance();
  
  // Live update кожні 3 секунди
  setInterval(simulateLive, 3000);
  
  // Оновлення матчів кожні 60 секунд (нові матчі)
  setInterval(() => {
    generateMatches();
    renderMatches();
  }, 60000);
}

// Блокуємо зум на double-tap
document.addEventListener('dblclick', e => e.preventDefault());

init();
</script>
