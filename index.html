<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoBetStar Official</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcf4b;
            --gold-grad: linear-gradient(135deg, #ffcf4b 0%, #b8860b 100%);
            --dark: #0a0a0c;
            --card: #16161a;
            --blue: #00e5ff;
            --red: #ff3e3e;
            --green: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: #fff; min-height: 100vh; overflow-x: hidden; padding-bottom: 80px; }

        /* UI */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .balance-pill { background: #1a1a1c; padding: 8px 16px; border-radius: 50px; border: 1px solid var(--gold); cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .btn-gold { background: var(--gold-grad); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        .btn-gold:disabled { opacity: 0.5; filter: grayscale(1); }

        /* Профіль */
        .lvl-container { background: #222; height: 6px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .lvl-bar { background: var(--gold); height: 100%; width: 0%; transition: 0.4s; }

        /* Магазин */
        .shop-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1f1f23; border-radius: 15px; margin-bottom: 10px; border: 1px solid #333; }
        .id-num { font-family: monospace; color: var(--gold); font-size: 18px; font-weight: bold; }

        /* Ігри - Дизайн */
        .game-area { background: #000; border-radius: 20px; padding: 30px 10px; text-align: center; border: 1px solid #333; margin: 15px 0; position: relative; overflow: hidden; }
        
        /* Слоти */
        .slot-box { display: flex; gap: 10px; justify-content: center; }
        .reel { width: 70px; height: 90px; background: #1a1a1c; border: 2px solid #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 40px; }

        /* Crash */
        .crash-mult { font-size: 50px; font-weight: 900; color: var(--blue); margin-bottom: 20px; }
        .rocket { font-size: 40px; position: absolute; left: 10%; bottom: 10%; transition: 0.1s linear; }

        /* Колесо */
        #wheel-c { width: 250px; height: 250px; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .wheel-pin { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--gold); z-index: 5; }

        /* Оплата */
        #modal-pay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .pay-box { background: #fff; color: #000; width: 90%; max-width: 380px; border-radius: 24px; padding: 25px; }
        .pay-input { width: 100%; padding: 12px; margin: 8px 0 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }

        /* Навігація */
        nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        .nav-link { color: #555; text-decoration: none; font-size: 11px; text-align: center; }
        .nav-link.active { color: var(--gold); }
        .nav-link i { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900; color:var(--gold)">CasinoBetStar</div>
    <div class="balance-pill" onclick="openPay()">
        <span id="bal-val">2500</span> ₴ <i class="fas fa-plus-circle"></i>
    </div>
</header>

<section id="scr-home" class="screen active">
    <div class="card" style="background: linear-gradient(135deg, #1a1a1c, #000);">
        <h3 id="u-name">Tis Vitaliy <span style="background:var(--gold); color:#000; padding:2px 6px; border-radius:4px; font-size:10px;">LVL <span id="u-lvl">1</span></span></h3>
        <div class="lvl-container"><div class="lvl-bar" id="u-bar"></div></div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <div class="card" style="text-align:center; margin:0;" onclick="showScreen('scr-slots')">
            <i class="fas fa-gem" style="font-size:30px; color:var(--gold); margin-bottom:10px; display:block;"></i>
            <b>СЛОТИ</b>
        </div>
        <div class="card" style="text-align:center; margin:0;" onclick="showScreen('scr-wheel')">
            <i class="fas fa-dharmachakra" style="font-size:30px; color:var(--gold); margin-bottom:10px; display:block;"></i>
            <b>КОЛЕСО</b>
        </div>
        <div class="card" style="grid-column: span 2; display:flex; align-items:center; justify-content:center; gap:15px; margin:0;" onclick="showScreen('scr-crash')">
            <i class="fas fa-rocket" style="font-size:30px; color:var(--blue);"></i>
            <b>CRASH ROCKET</b>
        </div>
    </div>
</section>

<section id="scr-slots" class="screen">
    <div onclick="showScreen('scr-home')" style="color:#555; margin-bottom:15px;"><i class="fas fa-arrow-left"></i> Назад</div>
    <div class="game-area">
        <h2 style="margin-bottom:20px;">ROYAL 777</h2>
        <div class="slot-box">
            <div class="reel" id="r1">🍒</div>
            <div class="reel" id="r2">🍒</div>
            <div class="reel" id="r3">🍒</div>
        </div>
        <p style="margin:20px 0; color:#888;">Ставка: 100 ₴</p>
        <button class="btn-gold" id="btn-s" onclick="playSlots()">КРУТИТИ</button>
    </div>
</section>

<section id="scr-wheel" class="screen">
    <div onclick="showScreen('scr-home')" style="color:#555; margin-bottom:15px;"><i class="fas fa-arrow-left"></i> Назад</div>
    <div class="game-area">
        <div class="wheel-pin"></div>
        <canvas id="wheel-c" width="300" height="300"></canvas>
        <p style="margin:20px 0; color:#888;">Ставка: 200 ₴</p>
        <button class="btn-gold" id="btn-w" onclick="playWheel()">ГРАТИ</button>
    </div>
</section>

<section id="scr-crash" class="screen">
    <div onclick="showScreen('scr-home')" style="color:#555; margin-bottom:15px;"><i class="fas fa-arrow-left"></i> Назад</div>
    <div class="game-area" style="height:250px;">
        <div class="crash-mult" id="c-mult">x1.00</div>
        <div class="rocket" id="c-rock">🚀</div>
        <div style="position:absolute; bottom:20px; left:0; width:100%; padding:0 20px;">
            <button class="btn-gold" id="btn-c-start" onclick="playCrash()">СТАВКА 150 ₴</button>
            <button class="btn-gold" id="btn-c-out" onclick="cashOut()" style="display:none; background:var(--green);">ЗАБРАТИ</button>
        </div>
    </div>
</section>

<section id="scr-shop" class="screen">
    <h2 style="margin-bottom:20px;">Магазин ID</h2>
    <div id="shop-items"></div>
</section>

<section id="scr-prof" class="screen">
    <div class="card" style="text-align:center;">
        <div style="font-size:50px; margin-bottom:10px;">👤</div>
        <h2 id="p-name">Tis Vitaliy</h2>
        <p style="color:var(--gold); font-weight:bold; margin-bottom:20px;">ID: <span id="p-id">672026</span></p>
        <div style="display:flex; gap:10px;">
            <div class="card" style="flex:1; margin:0; padding:10px;">
                <small style="color:#555">Ігор</small><br><b id="st-games">0</b>
            </div>
            <div class="card" style="flex:1; margin:0; padding:10px;">
                <small style="color:#555">Ранг</small><br><b style="color:var(--gold)">VIP</b>
            </div>
        </div>
    </div>
    <button class="btn-gold" onclick="openPay()">ПОПОВНИТИ РАХУНОК</button>
</section>

<div id="modal-pay">
    <div class="pay-box">
        <div style="display:flex; justify-content:space-between; align-items:center; color:#000; margin-bottom:20px;">
            <b>Оплата карткою</b>
            <i class="fas fa-times" onclick="closePay()"></i>
        </div>
        <input type="text" class="pay-input" placeholder="Номер картки (16 цифр)">
        <div style="display:flex; gap:10px;">
            <input type="text" class="pay-input" placeholder="ММ/РР">
            <input type="password" class="pay-input" placeholder="CVV">
        </div>
        <input type="number" id="pay-val" class="pay-input" value="1000">
        <button class="btn-gold" onclick="doPay()" style="background:#000; color:#fff;">ПІДТВЕРДИТИ</button>
    </div>
</div>

<nav>
    <a href="javascript:void(0)" class="nav-link active" onclick="showScreen('scr-home', this)"><i class="fas fa-dice"></i>Лобі</a>
    <a href="javascript:void(0)" class="nav-link" onclick="showScreen('scr-shop', this)"><i class="fas fa-shopping-cart"></i>Магазин</a>
    <a href="javascript:void(0)" class="nav-link" onclick="showScreen('scr-prof', this)"><i class="fas fa-user"></i>Профіль</a>
</nav>

<script>
    let balance = 2500, exp = 0, lvl = 1, currentID = "672026", totalGames = 0;
    const shopIDs = [ {i:"777777", p:5000}, {i:"000001", p:25000}, {i:"TIS_BOSS", p:10000}, {i:"696969", p:3000} ];

    function updateUI() {
        document.getElementById('bal-val').innerText = balance;
        document.getElementById('u-lvl').innerText = lvl;
        document.getElementById('p-id').innerText = currentID;
        document.getElementById('st-games').innerText = totalGames;
        let p = (exp % 1000) / 10;
        document.getElementById('u-bar').style.width = p + "%";
        if(Math.floor(exp/1000) + 1 > lvl) { lvl++; alert("НОВИЙ РІВЕНЬ: " + lvl); }
    }

    function showScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) { document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
    }

    // --- GAMES ---
    const emj = ['💎','🍒','🍋','🔔','7️⃣'];
    function playSlots() {
        if(balance < 100) return alert("Мало грошей!");
        balance -= 100; totalGames++; exp += 50;
        let b = document.getElementById('btn-s'); b.disabled = true;
        let iv = setInterval(() => {
            document.getElementById('r1').innerText = emj[Math.floor(Math.random()*5)];
            document.getElementById('r2').innerText = emj[Math.floor(Math.random()*5)];
            document.getElementById('r3').innerText = emj[Math.floor(Math.random()*5)];
        }, 100);
        setTimeout(() => {
            clearInterval(iv); b.disabled = false;
            let r = [document.getElementById('r1').innerText, document.getElementById('r2').innerText, document.getElementById('r3').innerText];
            if(r[0]==r[1] && r[1]==r[2]) { balance += 1000; alert("JACKPOT! +1000₴"); }
            updateUI();
        }, 2000);
    }

    // Wheel
    const cv = document.getElementById('wheel-c'), ctx = cv.getContext('2d');
    const sc = [{l:"0", c:"#111", w:0}, {l:"400", c:"#b8860b", w:400}, {l:"0", c:"#111", w:0}, {l:"1000", c:"#ffcf4b", w:1000}, {l:"0", c:"#111", w:0}, {l:"200", c:"#ffcf4b", w:200}];
    function drawW() {
        let a = (Math.PI*2)/6;
        sc.forEach((s, i) => {
            ctx.beginPath(); ctx.fillStyle = s.c; ctx.moveTo(150,150); ctx.arc(150,150,140,i*a,(i+1)*a); ctx.fill();
            ctx.save(); ctx.translate(150,150); ctx.rotate(i*a+a/2); ctx.fillStyle="#fff"; ctx.fillText(s.l, 80, 5); ctx.restore();
        });
    }
    drawW();
    let wA = 0;
    function playWheel() {
        if(balance < 200) return;
        balance -= 200; totalGames++; exp += 80;
        let r = Math.floor(Math.random()*6);
        wA += (3600 + (r*60));
        cv.style.transform = `rotate(-${wA}deg)`;
        setTimeout(() => { balance += sc[r].w; if(sc[r].w>0) alert("Виграш: "+sc[r].w); updateUI(); }, 4000);
    }

    // Crash
    let cM = 1.0, cA = false, cIv;
    function playCrash() {
        if(balance < 150) return;
        balance -= 150; totalGames++; exp += 100;
        cA = true; cM = 1.0;
        document.getElementById('btn-c-start').style.display = 'none';
        document.getElementById('btn-c-out').style.display = 'block';
        let boom = (Math.random()*5 + 1.1);
        cIv = setInterval(() => {
            cM += 0.03;
            document.getElementById('c-mult').innerText = 'x' + cM.toFixed(2);
            document.getElementById('c-rock').style.left = (10 + cM*10) + '%';
            document.getElementById('c-rock').style.bottom = (10 + cM*10) + '%';
            if(cM >= boom) { 
                clearInterval(cIv); cA = false; 
                document.getElementById('c-mult').innerText = "BOOM!";
                setTimeout(() => {
                    document.getElementById('btn-c-start').style.display = 'block';
                    document.getElementById('btn-c-out').style.display = 'none';
                    document.getElementById('c-rock').style.left = '10%'; document.getElementById('c-rock').style.bottom = '10%';
                }, 2000);
            }
        }, 100);
    }
    function cashOut() {
        if(!cA) return;
        clearInterval(cIv); cA = false;
        let w = Math.floor(150 * cM); balance += w;
        alert("Забрали " + w + " ₴"); updateUI();
        document.getElementById('btn-c-start').style.display = 'block';
        document.getElementById('btn-c-out').style.display = 'none';
    }

    // --- КАСА & МАГАЗИН ---
    function openPay() { document.getElementById('modal-pay').style.display = 'flex'; }
    function closePay() { document.getElementById('modal-pay').style.display = 'none'; }
    function doPay() {
        let v = parseInt(document.getElementById('pay-val').value);
        if(v>0) { balance += v; closePay(); alert("Поповнено!"); updateUI(); }
    }

    function initShop() {
        let h = "";
        shopIDs.forEach(x => {
            h += `<div class="shop-row"><div class="id-num">${x.i}</div><button class="btn-gold" style="width:auto; padding:8px 15px;" onclick="buyID('${x.i}', ${x.p})">${x.p} ₴</button></div>`;
        });
        document.getElementById('shop-items').innerHTML = h;
    }
    function buyID(i, p) {
        if(balance >= p) { balance -= p; currentID = i; alert("Новий ID: " + i); updateUI(); }
    }

    initShop(); updateUI();
</script>
</body>
</html>
