<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoBetStar Ultra</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --gold: #ffcf4b;
            --gold-dark: #b8860b;
            --bg: #0b0b0e;
            --card: rgba(26, 26, 30, 0.9);
            --blue: #00d2ff;
            --green: #00ff88;
            --red: #ff3e3e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0b0b0e 70%);
            color: #fff;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* --- UI Elements --- */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 11, 14, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 207, 75, 0.1);
        }

        .logo { font-weight: 900; font-size: 22px; background: linear-gradient(to right, var(--gold), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }

        .balance-chip {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            box-shadow: 0 0 15px rgba(255, 207, 75, 0.2);
            cursor: pointer;
        }

        /* --- Screen System --- */
        .screen { display: none; padding: 20px; animation: screenFade 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes screenFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* --- Cards & Buttons --- */
        .glass-card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-action {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 900;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(184, 134, 11, 0.4);
            transition: 0.3s;
        }
        .btn-action:active { transform: translateY(2px); box-shadow: none; }
        .btn-action:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        /* --- Games Grid (Home) --- */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-node {
            background: linear-gradient(145deg, #1e1e24, #141418);
            border-radius: 24px;
            padding: 25px 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .game-node i { font-size: 32px; margin-bottom: 12px; display: block; background: linear-gradient(var(--gold), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .game-node b { font-size: 14px; letter-spacing: 1px; }

        /* --- Level System --- */
        .lvl-box { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .progress-track { background: rgba(255,255,255,0.05); height: 10px; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: var(--gold); height: 100%; width: 0%; box-shadow: 0 0 10px var(--gold); transition: 0.5s ease; }

        /* --- Game Arenas --- */
        .arena { background: #000; border-radius: 30px; padding: 40px 20px; border: 1px solid #222; text-align: center; margin: 20px 0; position: relative; }
        
        /* Slots */
        .slot-reels { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
        .reel-unit { width: 70px; height: 100px; background: #111; border: 2px solid #333; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; }

        /* Wheel */
        #wheel-element { width: 260px; height: 260px; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); margin: 0 auto; display: block; }
        .pointer { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 35px; z-index: 10; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        /* Crash */
        .arena-crash { background: #000; height: 300px; border-radius: 30px; border: 1px solid #222; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        #crash-mult { font-size: 60px; font-weight: 900; color: var(--blue); z-index: 10; text-shadow: 0 0 20px rgba(0, 210, 255, 0.5); transition: color 0.3s; }
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 50px; transition: 0.1s linear; z-index: 5; }

        /* --- Navigation --- */
        nav {
            position: fixed; bottom: 0; width: 100%; background: rgba(11, 11, 14, 0.95);
            backdrop-filter: blur(20px); display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000;
        }
        .nav-tab { color: #555; text-decoration: none; text-align: center; transition: 0.3s; }
        .nav-tab.active { color: var(--gold); }
        .nav-tab i { font-size: 24px; display: block; margin-bottom: 4px; }
        .nav-tab span { font-size: 10px; font-weight: 700; text-transform: uppercase; }

        /* --- Modal Pay --- */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .pay-card { background: #fff; width: 90%; max-width: 400px; border-radius: 30px; padding: 30px; color: #000; }
        .pay-field { width: 100%; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 15px; background: #f9f9f9; font-size: 16px; outline: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CasinoBetStar</div>
        <div class="balance-chip" onclick="openPay()">
            <span id="header-bal">2500</span> <span style="color:var(--gold)">₴</span>
            <i class="fas fa-plus-circle" style="color:var(--gold)"></i>
        </div>
    </header>

    <section id="scr-home" class="screen active">
        <div class="glass-card" style="background: linear-gradient(135deg, rgba(255,207,75,0.1), transparent);">
            <div class="lvl-box">
                <span style="font-weight: 900; letter-spacing: 1px;">TIS VITALIY</span>
                <span style="color: var(--gold); font-weight: 900;">LVL <span id="u-lvl">1</span></span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="u-bar"></div></div>
            <p style="font-size: 10px; margin-top: 8px; opacity: 0.5;">XP ДО НАСТУПНОГО РІВНЯ: <span id="xp-val">0</span>/1000</p>
        </div>

        <div class="game-grid">
            <div class="game-node" onclick="showScreen('scr-slots')">
                <i class="fas fa-dice"></i>
                <b>ROYAL SLOTS</b>
            </div>
            <div class="game-node" onclick="showScreen('scr-wheel')">
                <i class="fas fa-dharmachakra"></i>
                <b>LUCKY WHEEL</b>
            </div>
            <div class="game-node" style="grid-column: span 2;" onclick="showScreen('scr-crash')">
                <div style="display:flex; align-items:center; justify-content:center; gap:20px;">
                    <i class="fas fa-rocket" style="margin:0; background:linear-gradient(var(--blue), #fff); -webkit-background-clip:text;"></i>
                    <div style="text-align:left">
                        <b style="display:block">CRASH GALAXY</b>
                        <small style="color:var(--blue)">ШВИДКІ ГРОШІ</small>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="scr-slots" class="screen">
        <div onclick="showScreen('scr-home')" style="opacity:0.5; margin-bottom:20px; cursor:pointer; display:inline-block;"><i class="fas fa-chevron-left"></i> НАЗАД</div>
        <div class="arena">
            <h1 style="font-weight:900; margin-bottom:30px; letter-spacing:2px;">SLOTS</h1>
            <div class="slot-reels">
                <div class="reel-unit" id="r1">💎</div>
                <div class="reel-unit" id="r2">💎</div>
                <div class="reel-unit" id="r3">💎</div>
            </div>
            <p style="color:#888; margin-bottom:15px; font-weight:bold;">СТАВКА: 100 ₴</p>
            <button class="btn-action" id="btn-spin" onclick="playSlots()">КРУТИТИ</button>
        </div>
    </section>

    <section id="scr-wheel" class="screen">
        <div onclick="showScreen('scr-home')" style="opacity:0.5; margin-bottom:20px; cursor:pointer; display:inline-block;"><i class="fas fa-chevron-left"></i> НАЗАД</div>
        <div class="arena">
            <i class="fas fa-caret-down pointer"></i>
            <canvas id="wheel-element" width="260" height="260"></canvas>
            <p style="color:#888; margin:20px 0 15px; font-weight:bold;">СТАВКА: 200 ₴</p>
            <button class="btn-action" id="btn-wheel" onclick="playWheel()">ГРАТИ</button>
        </div>
    </section>

    <section id="scr-crash" class="screen">
        <div onclick="showScreen('scr-home')" style="opacity:0.5; margin-bottom:20px; cursor:pointer; display:inline-block;"><i class="fas fa-chevron-left"></i> НАЗАД</div>
        <div class="arena-crash">
            <div id="crash-mult">x1.00</div>
            <div id="rocket">🚀</div>
        </div>
        <div class="glass-card" style="text-align: center;">
            <p style="color:#888; margin-bottom:15px; font-weight:bold;">СТАВКА: 150 ₴</p>
            <button class="btn-action" id="btn-crash-start" onclick="startCrash()">ПОСТАВИТИ</button>
            <button class="btn-action" id="btn-crash-out" onclick="cashOut()" style="display:none; background:var(--green); color:#000;">ЗАБРАТИ ВИГРАШ</button>
        </div>
    </section>

    <section id="scr-shop" class="screen">
        <h1 style="font-weight:900; margin-bottom:20px; text-align:center;">МАГАЗИН ID</h1>
        <div id="shop-container"></div>
    </section>

    <section id="scr-prof" class="screen">
        <div class="glass-card" style="text-align:center;">
            <div style="width:100px; height:100px; background:var(--gold-dark); border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:40px; border: 4px solid var(--gold); color:#000; font-weight:bold;">
                T
            </div>
            <h2 id="p-name">Tis Vitaliy</h2>
            <p style="color:var(--gold); font-weight:900; letter-spacing:2px; margin-top:5px;">ID: <span id="p-id">672026</span></p>
        </div>
        <button class="btn-action" onclick="openPay()">ПОПОВНИТИ БАЛАНС</button>
    </section>

    <div class="modal-overlay" id="pay-modal">
        <div class="pay-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
                <b style="font-size:18px;">ПОПОВНЕННЯ КАРТКОЮ</b>
                <i class="fas fa-times" onclick="closePay()" style="cursor:pointer; font-size:20px; color:#888;"></i>
            </div>
            <input type="text" class="pay-field" placeholder="Номер картки (16 цифр)" maxlength="19">
            <div style="display:flex; gap:10px;">
                <input type="text" class="pay-field" placeholder="ММ/РР" maxlength="5">
                <input type="password" class="pay-field" placeholder="CVV" maxlength="3">
            </div>
            <label style="font-size:12px; font-weight:bold; color:#555; margin-bottom:5px; display:block;">Сума поповнення (₴)</label>
            <input type="number" id="pay-amt" class="pay-field" value="1000">
            <button class="btn-action" style="background:#000; color:#fff;" onclick="doPay()">ОПЛАТИТИ</button>
        </div>
    </div>

    <nav>
        <a href="#" class="nav-tab active" onclick="showScreen('scr-home', this)"><i class="fas fa-th-large"></i><span>ЛОБІ</span></a>
        <a href="#" class="nav-tab" onclick="showScreen('scr-shop', this)"><i class="fas fa-shopping-bag"></i><span>МАГАЗИН</span></a>
        <a href="#" class="nav-tab" onclick="showScreen('scr-prof', this)"><i class="fas fa-user-shield"></i><span>ПРОФІЛЬ</span></a>
    </nav>

    <script>
        // Глобальні змінні
        let balance = 2500;
        let exp = 0;
        let level = 1;
        let currentID = "672026";

        // Оновлення інтерфейсу (Баланс, Рівень, ID)
        function updateUI() {
            document.getElementById('header-bal').innerText = balance;
            document.getElementById('u-lvl').innerText = level;
            document.getElementById('p-id').innerText = currentID;
            
            let progress = (exp % 1000) / 10;
            document.getElementById('u-bar').style.width = progress + "%";
            document.getElementById('xp-val').innerText = exp % 1000;
            
            if(Math.floor(exp / 1000) + 1 > level) { 
                level++; 
                alert("ВІТАЄМО! НОВИЙ РІВЕНЬ: " + level); 
            }
        }

        // Перемикання екранів
        function showScreen(id, navElement = null) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            if(navElement) { 
                document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active')); 
                navElement.classList.add('active'); 
            }
        }

        /* ==========================
           ГРА 1: СЛОТИ
           ========================== */
        const slotSymbols = ['💎', '🍋', '🔔', '🍒', '7️⃣'];
        function playSlots() {
            if(balance < 100) return alert("Недостатньо коштів на балансі!");
            balance -= 100; 
            exp += 50; 
            updateUI();
            
            let btn = document.getElementById('btn-spin'); 
            btn.disabled = true;
            
            let interval = setInterval(() => {
                document.getElementById('r1').innerText = slotSymbols[Math.floor(Math.random()*5)];
                document.getElementById('r2').innerText = slotSymbols[Math.floor(Math.random()*5)];
                document.getElementById('r3').innerText = slotSymbols[Math.floor(Math.random()*5)];
            }, 100);
            
            setTimeout(() => {
                clearInterval(interval); 
                btn.disabled = false;
                let res = [document.getElementById('r1').innerText, document.getElementById('r2').innerText, document.getElementById('r3').innerText];
                if(res[0] === res[1] && res[1] === res[2]) { 
                    balance += 1500; 
                    alert("ДЖЕКПОТ! Виграш: 1500 ₴"); 
                    updateUI(); 
                }
            }, 2000);
        }

        /* ==========================
           ГРА 2: КОЛЕСО ФОРТУНИ
           ========================== */
        const canvas = document.getElementById('wheel-element');
        const ctx = canvas.getContext('2d');
        const wheelSectors = [
            {label: "0", color: "#111", win: 0}, 
            {label: "500", color: "#b8860b", win: 500}, 
            {label: "0", color: "#111", win: 0}, 
            {label: "1000", color: "#ffcf4b", win: 1000}, 
            {label: "0", color: "#111", win: 0}, 
            {label: "300", color: "#b8860b", win: 300}
        ];
        
        function drawWheel() {
            let arc = (Math.PI * 2) / 6;
            wheelSectors.forEach((s, i) => {
                ctx.beginPath(); 
                ctx.fillStyle = s.color; 
                ctx.moveTo(130, 130); 
                ctx.arc(130, 130, 125, i * arc, (i + 1) * arc); 
                ctx.fill();
                
                ctx.save(); 
                ctx.translate(130, 130); 
                ctx.rotate(i * arc + arc / 2); 
                ctx.fillStyle = "#fff"; 
                ctx.font = "bold 18px Montserrat"; 
                ctx.fillText(s.label, 70, 6); 
                ctx.restore();
            });
        }
        
        // Малюємо колесо при завантаженні
        drawWheel();
        
        let currentRotation = 0;
        let isWheelSpinning = false;
        
        function playWheel() {
            if(isWheelSpinning) return;
            if(balance < 200) return alert("Недостатньо коштів на балансі!");
            
            balance -= 200; 
            exp += 80; 
            updateUI();
            
            isWheelSpinning = true;
            let btn = document.getElementById('btn-wheel');
            btn.disabled = true;

            let randSector = Math.floor(Math.random() * 6);
            currentRotation += (3600 + (randSector * 60));
            canvas.style.transform = `rotate(-${currentRotation}deg)`;
            
            setTimeout(() => { 
                isWheelSpinning = false;
                btn.disabled = false;
                let winAmount = wheelSectors[randSector].win;
                balance += winAmount; 
                if(winAmount > 0) alert("ВІТАЄМО! Виграш: " + winAmount + " ₴"); 
                updateUI(); 
            }, 4100);
        }

        /* ==========================
           ГРА 3: CRASH (РАКЕТА)
           ========================== */
        let crashMultiplier = 1.0;
        let crashInterval;
        let isCrashRunning = false;

        function startCrash() {
            if(balance < 150) return alert("Недостатньо коштів на балансі!");
            
            balance -= 150; 
            exp += 100; 
            updateUI();
            
            isCrashRunning = true;
            crashMultiplier = 1.0;
            
            document.getElementById('btn-crash-start').style.display = 'none';
            document.getElementById('btn-crash-out').style.display = 'block';
            document.getElementById('crash-mult').style.color = 'var(--blue)';

            let boomPoint = (Math.random() * 4 + 1.1); // Вибух від x1.1 до x5.1
            let rock = document.getElementById('rocket');

            crashInterval = setInterval(() => {
                crashMultiplier += 0.02;
                document.getElementById('crash-mult').innerText = 'x' + crashMultiplier.toFixed(2);
                
                // Ракета летить по діагоналі вгору (від 20% до 80% екрану)
                rock.style.left = (20 + (crashMultiplier - 1) * 15) + '%';
                rock.style.bottom = (20 + (crashMultiplier - 1) * 15) + '%';

                if(crashMultiplier >= boomPoint) {
                    clearInterval(crashInterval);
                    isCrashRunning = false;
                    document.getElementById('crash-mult').innerText = "BOOM!";
                    document.getElementById('crash-mult').style.color = 'var(--red)';
                    
                    setTimeout(() => { resetCrashUI(); }, 2000);
                }
            }, 100);
        }

        function cashOut() {
            if(!isCrashRunning) return;
            clearInterval(crashInterval);
            isCrashRunning = false;
            
            let winAmount = Math.floor(150 * crashMultiplier);
            balance += winAmount;
            alert("ЗАБРАЛИ! Виграш: " + winAmount + " ₴");
            
            updateUI();
            resetCrashUI();
        }

        function resetCrashUI() {
            document.getElementById('btn-crash-start').style.display = 'block';
            document.getElementById('btn-crash-out').style.display = 'none';
            document.getElementById('rocket').style.left = '20px';
            document.getElementById('rocket').style.bottom = '20px';
            document.getElementById('crash-mult').innerText = "x1.00";
            document.getElementById('crash-mult').style.color = 'var(--blue)';
        }

        /* ==========================
           МАГАЗИН ID
           ========================== */
        const shopItemsData = [ 
            {id: "777777", price: 5000}, 
            {id: "000001", price: 20000}, 
            {id: "KING_TIS", price: 15000}, 
            {id: "LUCKY_67", price: 7000} 
        ];

        function initShop() {
            let htmlStr = "";
            shopItemsData.forEach(item => {
                htmlStr += `
                <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <b style="font-family:monospace; font-size:20px; color:var(--gold)">${item.id}</b><br>
                        <small style="color:#888;">ЦІНА: ${item.price} ₴</small>
                    </div>
                    <button class="btn-action" style="width:auto; padding:10px 20px; font-size:12px;" onclick="buyID('${item.id}', ${item.price})">КУПИТИ</button>
                </div>`;
            });
            document.getElementById('shop-container').innerHTML = htmlStr;
        }

        function buyID(id, price) { 
            if(balance >= price) { 
                balance -= price; 
                currentID = id; 
                alert("УСПІШНО! Ваш новий ID: " + id); 
                updateUI(); 
            } else {
                alert("Недостатньо коштів для покупки!");
            }
        }

        /* ==========================
           СИСТЕМА ПОПОВНЕННЯ (ЕКВАЙРИНГ)
           ========================== */
        function openPay() { document.getElementById('pay-modal').style.display = 'flex'; }
        function closePay() { document.getElementById('pay-modal').style.display = 'none'; }
        
        function doPay() { 
            let amount = parseInt(document.getElementById('pay-amt').value); 
            if(amount > 0) { 
                balance += amount; 
                closePay(); 
                alert("Транзакція успішна! Баланс поповнено на " + amount + " ₴"); 
                updateUI(); 
            } 
        }

        // Ініціалізація при завантаженні сторінки
        initShop(); 
        updateUI();

    </script>
</body>
</html>
